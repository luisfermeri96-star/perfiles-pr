<!DOCTYPE html>
<html lang="es">
<head>

    }

    #info {

    }
  </style>
</head>
<body>

    2009 - XXXXXXXXXXXXXXXXXXXXXXXXX <br>

    2020 - ------------------- <br><br>

  }
};
    const params = new URLSearchParams(window.location.search);
